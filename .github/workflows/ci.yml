name: CI

on:
  push:
    branches: ["main", "master"]
  pull_request:

env:
  CARGO_TERM_COLOR: always
  # Treat all rustc warnings as errors for the host build gate.
  RUSTFLAGS: "-D warnings"

jobs:
  # ── Host-side build & test ────────────────────────────────────────────────────
  host:
    name: Host build & test
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Install stable Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache Cargo registry & build artifacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      # ── Format check ──────────────────────────────────────────────────────────
      - name: Check formatting
        run: cargo fmt --check

      # ── Clippy (zero warnings gate) ───────────────────────────────────────────
      - name: Clippy – zero warnings
        run: cargo clippy -- -D warnings

      # ── Release build (zero warnings gate) ───────────────────────────────────
      - name: Build --release (zero warnings)
        run: cargo build --release

      # ── Host unit tests ───────────────────────────────────────────────────────
      - name: Run host-side unit tests
        run: cargo test

  # ── Dependency audit: ensure `alloc` is not in the production dep tree ────────
  dep-audit:
    name: Dependency audit
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Install stable Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-audit-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-audit-

      - name: Verify alloc is absent from production dependency tree
        run: |
          # `cargo tree` without --dev-deps lists only the production
          # (non-test) dependency graph.  The `alloc` standard-library crate
          # must not appear because the firmware uses no global allocator.
          if cargo tree --no-dedupe --edges no-dev 2>&1 | grep -E '^\s*(alloc|extern crate alloc)'; then
            echo "ERROR: 'alloc' found in the production dependency tree!"
            exit 1
          fi
          echo "OK: 'alloc' is not present in the production dependency tree."
